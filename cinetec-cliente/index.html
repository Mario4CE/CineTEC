<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTec - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <!-- Header -->
            <div class="auth-header">
                <h1>🎬 CineTec</h1>
                <p>Reserva tus películas favoritas</p>
            </div>

            <!-- Body -->
            <div class="auth-body">
                <!-- Alertas -->
                <div id="alertError" class="alert alert-error"></div>
                <div id="alertSuccess" class="alert alert-success"></div>

                <!-- Loading -->
                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p>Procesando...</p>
                </div>

                <!-- Formulario de Login -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="cedula">Cédula de Identidad</label>
                        <input 
                            type="text" 
                            id="cedula" 
                            name="cedula" 
                            placeholder="Ej: 1234567890"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-auth">Ingresar</button>
                </form>

                <!-- Link a Registro -->
                <div style="text-align: center; margin-top: 20px;">
                    <p style="margin: 0; font-size: 14px; color: #7f8c8d;">
                        ¿Eres nuevo en CineTec?
                    </p>
                </div>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <p>
                    <a href="registro.html">Crear una cuenta</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Verificar si el usuario ya está autenticado
        document.addEventListener('DOMContentLoaded', function() {
            if (verificarSesion()) {
                // Si ya está autenticado, redirigir a la próxima página
                redirigir('menu.html');
            }

            // Manejar el envío del formulario de login
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const cedula = document.getElementById('cedula').value;

                try {
                    const usuario = await iniciarSesion(cedula);
                    mostrarExito(`¡Bienvenido, ${usuario.nombreCompleto}!`);
                    
                    // Redirigir después de 1.5 segundos
                    redirigir('menu.html', 1500);
                } catch (error) {
                    mostrarError(error.message);
                }
            });
        });
    </script>
</body>
</html>
